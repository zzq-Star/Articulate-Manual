# ros2_control controller configuration
controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      
      - joint_0
      
      - joint_1
      
      - joint_2
      
      - joint_3
      
      - joint_4
      
      - joint_5
      

    command_joints:
      
      - joint_0
      
      - joint_1
      
      - joint_2
      
      - joint_3
      
      - joint_4
      
      - joint_5
      

    state_joints:
      
      - joint_0
      
      - joint_1
      
      - joint_2
      
      - joint_3
      
      - joint_4
      
      - joint_5
      

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    open_loop_control: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 5.0

    gains:
      
      joint_0:
        p: 100.0
        i: 0.0
        d: 10.0
        i_clamp: 0.0
      
      joint_1:
        p: 100.0
        i: 0.0
        d: 10.0
        i_clamp: 0.0
      
      joint_2:
        p: 100.0
        i: 0.0
        d: 10.0
        i_clamp: 0.0
      
      joint_3:
        p: 100.0
        i: 0.0
        d: 10.0
        i_clamp: 0.0
      
      joint_4:
        p: 100.0
        i: 0.0
        d: 10.0
        i_clamp: 0.0
      
      joint_5:
        p: 100.0
        i: 0.0
        d: 10.0
        i_clamp: 0.0
      
